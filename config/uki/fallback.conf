# UKI build profile: fallback (all modules, minimal initramfs)
name      = aether-fallback
kernel    = vmlinuz-6.14-aether
initramfs = initramfs-6.14-aether-fallback.img
cmdline   = config/cmdline/default.conf
stub      = /usr/lib/systemd/boot/efi/linuxx64.efi.stub
output    = aether-6.14-fallback.efi
--splash = config/branding/splash.bmp
--pcr-banks = sha256
